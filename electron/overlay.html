<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InterviewAI Overlay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #F7931A;
      --orange2: #FF6B2B;
      --bg: rgba(10, 12, 20, 0.93);
      --card: rgba(17, 24, 39, 0.96);
      --border: rgba(255,255,255,0.08);
      --text: #e8e8f0;
      --muted: #94A3B8;
      --radius: 16px;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      color: var(--text);
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(247,147,26,0.12),
        0 24px 64px rgba(0,0,0,0.6),
        0 0 40px rgba(247,147,26,0.06);
    }

    /* ── Title bar (drag handle) ─────────────────────────── */
    #titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px 9px 14px;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      flex-shrink: 0;
      gap: 8px;
    }

    #titlebar-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    #logo { font-size: 14px; flex-shrink: 0; }

    #app-name {
      font-weight: 700;
      font-size: 12px;
      background: linear-gradient(90deg, #F7931A, #FF6B2B);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
    }

    #status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      transition: all 0.3s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #status-badge.idle     { background: rgba(100,116,139,0.15); border: 1px solid rgba(100,116,139,0.3); color: #64748B; }
    #status-badge.listening{ background: rgba(247,147,26,0.12);  border: 1px solid rgba(247,147,26,0.3);  color: #F7931A; }
    #status-badge.thinking { background: rgba(139,92,246,0.12);  border: 1px solid rgba(139,92,246,0.3);  color: #A78BFA; }
    #status-badge.ready    { background: rgba(34,197,94,0.12);   border: 1px solid rgba(34,197,94,0.3);   color: #4ADE80; }

    .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .listening .status-dot { background: #F7931A; animation: pulse 1.2s ease-in-out infinite; }
    .thinking  .status-dot { background: #A78BFA; animation: spin-dot 1s linear infinite; }
    .ready     .status-dot { background: #4ADE80; }
    .idle      .status-dot { background: #64748B; }

    @keyframes pulse    { 0%,100%{opacity:.4;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }
    @keyframes spin-dot { 0%{opacity:.2} 50%{opacity:1} 100%{opacity:.2} }

    /* ── Title bar controls (no drag) ──────────────────────── */
    #tb-controls {
      display: flex;
      align-items: center;
      gap: 5px;
      -webkit-app-region: no-drag;
      flex-shrink: 0;
    }

    #opacity-wrap { display: flex; align-items: center; gap: 4px; }
    #opacity-icon { font-size: 10px; opacity: 0.5; }
    #opacity-slider {
      -webkit-appearance: none; appearance: none;
      width: 54px; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.15); outline: none; cursor: pointer;
    }
    #opacity-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px; height: 11px; border-radius: 50%;
      background: #F7931A; cursor: pointer;
      box-shadow: 0 0 5px rgba(247,147,26,0.5);
    }

    .ctrl-btn {
      width: 22px; height: 22px; border-radius: 6px; border: none;
      background: rgba(255,255,255,0.06); color: var(--muted);
      cursor: pointer; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; -webkit-app-region: no-drag;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.12); color: white; }
    #close-btn:hover { background: rgba(239,68,68,0.2); color: #EF4444; }

    /* ── Quick controls bar ─────────────────────────────────── */
    #controls-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: nowrap;
      overflow: hidden;
    }

    /* Mic toggle button */
    #mic-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(247,147,26,0.4);
      background: rgba(247,147,26,0.12);
      color: #F7931A;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }
    #mic-btn:hover { background: rgba(247,147,26,0.22); }
    #mic-btn.muted {
      border-color: rgba(239,68,68,0.4);
      background: rgba(239,68,68,0.12);
      color: #F87171;
    }
    #mic-btn.muted:hover { background: rgba(239,68,68,0.22); }
    #mic-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #F7931A;
      animation: pulse 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    #mic-btn.muted #mic-dot { background: #F87171; animation: none; }

    /* Desi mode toggle */
    #desi-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 9px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }
    #desi-btn:hover { border-color: rgba(247,147,26,0.3); color: white; }
    #desi-btn.active {
      border-color: rgba(247,147,26,0.5);
      background: rgba(247,147,26,0.1);
      color: #F7931A;
    }

    /* Language selector */
    #lang-select {
      padding: 3px 6px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      font-size: 10px;
      cursor: pointer;
      outline: none;
      max-width: 80px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }
    #lang-select:focus { border-color: rgba(247,147,26,0.3); color: white; }
    #lang-select option { background: #111827; color: white; }

    /* Spacer */
    .ctrl-spacer { flex: 1; }

    /* Show App button */
    #show-app-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 9px;
      border-radius: 20px;
      border: 1px solid rgba(139,92,246,0.35);
      background: rgba(139,92,246,0.1);
      color: #A78BFA;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }
    #show-app-btn:hover { background: rgba(139,92,246,0.2); color: #C4B5FD; }

    /* ── Content ─────────────────────────────────────────── */
    #content {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Question section */
    #question-section {
      padding: 9px 14px 7px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #question-section.hidden { display: none; }

    .section-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #question-text {
      font-size: 12px;
      color: #CBD5E1;
      line-height: 1.5;
      max-height: 50px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    /* Answer section */
    #answer-section {
      flex: 1;
      padding: 9px 14px 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #answer-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #answer-text-wrap {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(247,147,26,0.3) transparent;
    }
    #answer-text-wrap::-webkit-scrollbar { width: 3px; }
    #answer-text-wrap::-webkit-scrollbar-thumb { background: rgba(247,147,26,0.3); border-radius: 2px; }

    #answer-text {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }
    #answer-text.empty { color: var(--muted); font-style: italic; }

    #cursor {
      display: inline-block;
      width: 2px; height: 14px;
      background: #F7931A; border-radius: 1px;
      animation: blink 0.8s ease-in-out infinite;
      vertical-align: text-bottom; margin-left: 1px;
    }
    #cursor.hidden { display: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    #copy-btn {
      padding: 3px 10px; border-radius: 8px;
      border: 1px solid rgba(247,147,26,0.3);
      background: rgba(247,147,26,0.08);
      color: #F7931A; font-size: 10px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
      white-space: nowrap; flex-shrink: 0;
    }
    #copy-btn:hover { background: rgba(247,147,26,0.18); }
    #copy-btn.copied { color: #4ADE80; border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.08); }

    /* ── Thinking animation ─────────────────────────────── */
    #thinking-dots {
      display: none; gap: 4px; padding: 8px 0; align-items: center;
    }
    #thinking-dots.visible { display: flex; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #A78BFA; animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-6px);opacity:1} }

    /* ── Footer ─────────────────────────────────────────── */
    #footer {
      padding: 5px 14px 7px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; background: rgba(0,0,0,0.2);
    }
    .shortcut-hint {
      font-size: 9px; color: rgba(148,163,184,0.45);
      display: flex; align-items: center; gap: 3px; flex-wrap: wrap;
    }
    .kbd {
      padding: 1px 4px; border-radius: 3px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 9px; font-family: monospace;
    }
    #shield-badge {
      display: flex; align-items: center; gap: 4px;
      font-size: 9px; color: #4ADE80; font-weight: 600;
    }

    * { -webkit-user-select: none; }
    #answer-text { -webkit-user-select: text; }
  </style>
</head>
<body>
  <div id="app">

    <!-- Title bar (drag handle) -->
    <div id="titlebar">
      <div id="titlebar-left">
        <span id="logo">🐦</span>
        <span id="app-name">InterviewAI</span>
        <span id="status-badge" class="idle">
          <span class="status-dot"></span>
          <span id="status-text">Idle</span>
        </span>
      </div>
      <div id="tb-controls">
        <div id="opacity-wrap" title="Transparency">
          <span id="opacity-icon">◑</span>
          <input type="range" id="opacity-slider" min="15" max="100" value="95" />
        </div>
        <button class="ctrl-btn" id="clear-btn" title="Clear answer">⌫</button>
        <button class="ctrl-btn" id="minimize-btn" title="Hide (Ctrl+Shift+Space)">─</button>
        <button class="ctrl-btn" id="close-btn" title="Close overlay">✕</button>
      </div>
    </div>

    <!-- Quick controls: mic, mode, show app -->
    <div id="controls-bar">
      <!-- Mic toggle -->
      <button id="mic-btn" title="Toggle microphone (Ctrl+Shift+M)">
        <span id="mic-dot"></span>
        <span id="mic-label">Mic On</span>
      </button>

      <!-- Desi mode toggle -->
      <button id="desi-btn" title="Toggle Desi Mode (Indian English)">
        🇮🇳 Desi
      </button>

      <!-- Language selector -->
      <select id="lang-select" title="Speech recognition language">
        <option value="en-US">EN US</option>
        <option value="en-IN">EN IN</option>
        <option value="hi-IN">हिंदी</option>
        <option value="ta-IN">தமிழ்</option>
        <option value="te-IN">తెలుగు</option>
      </select>

      <div class="ctrl-spacer"></div>

      <!-- Show main app -->
      <button id="show-app-btn" title="Show main InterviewAI window">
        ⬜ Show App
      </button>
    </div>

    <!-- Content -->
    <div id="content">

      <!-- Detected question -->
      <div id="question-section" class="hidden">
        <div class="section-label">
          <span>🎙</span> Question detected
        </div>
        <p id="question-text"></p>
      </div>

      <!-- AI Answer -->
      <div id="answer-section">
        <div id="answer-label-row">
          <div class="section-label">
            <span>🤖</span> AI Answer
          </div>
          <button id="copy-btn">Copy</button>
        </div>

        <div id="thinking-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <span style="font-size:11px; color:#A78BFA; margin-left:4px;">Generating answer…</span>
        </div>

        <div id="answer-text-wrap">
          <p id="answer-text" class="empty">Waiting for a question…</p>
          <span id="cursor" class="hidden"></span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div id="footer">
      <div class="shortcut-hint">
        <span class="kbd">Ctrl+Shift+Space</span> toggle
        &nbsp;·&nbsp;
        <span class="kbd">Ctrl+Shift+M</span> mic
        &nbsp;·&nbsp;
        <span class="kbd">Ctrl+Shift+C</span> copy
      </div>
      <div id="shield-badge">🛡 Screen invisible</div>
    </div>

  </div>

  <script>
    const api = window.electronAPI

    // ── State ────────────────────────────────────────────────
    let fullAnswer = ''
    let currentStatus = 'idle'
    let micActive = false
    let desiMode = false
    let currentLang = 'en-US'

    // ── DOM refs ─────────────────────────────────────────────
    const statusBadge   = document.getElementById('status-badge')
    const statusText    = document.getElementById('status-text')
    const questionSec   = document.getElementById('question-section')
    const questionText  = document.getElementById('question-text')
    const answerText    = document.getElementById('answer-text')
    const cursor        = document.getElementById('cursor')
    const copyBtn       = document.getElementById('copy-btn')
    const clearBtn      = document.getElementById('clear-btn')
    const minimizeBtn   = document.getElementById('minimize-btn')
    const closeBtn      = document.getElementById('close-btn')
    const opacitySlider = document.getElementById('opacity-slider')
    const thinkingDots  = document.getElementById('thinking-dots')
    const answerWrap    = document.getElementById('answer-text-wrap')
    const micBtn        = document.getElementById('mic-btn')
    const micLabel      = document.getElementById('mic-label')
    const desiBtn       = document.getElementById('desi-btn')
    const langSelect    = document.getElementById('lang-select')
    const showAppBtn    = document.getElementById('show-app-btn')

    // ── Status helper ─────────────────────────────────────────
    function setStatus(s) {
      currentStatus = s
      statusBadge.className = 'idle'
      statusBadge.classList.add(s)
      const labels = { idle: 'Idle', listening: 'Listening', thinking: 'Thinking', ready: 'Ready' }
      statusText.textContent = labels[s] || s
      thinkingDots.className = s === 'thinking' ? 'visible' : ''
      answerWrap.style.display = s === 'thinking' ? 'none' : 'block'
    }

    // ── Mic state helper ──────────────────────────────────────
    function applyMicState(active) {
      micActive = active
      if (active) {
        micBtn.classList.remove('muted')
        micLabel.textContent = 'Mic On'
        setStatus('listening')
      } else {
        micBtn.classList.add('muted')
        micLabel.textContent = 'Mic Off'
        setStatus('idle')
      }
    }

    // ── Mode helper ───────────────────────────────────────────
    function applyDesiMode(enabled) {
      desiMode = enabled
      if (enabled) {
        desiBtn.classList.add('active')
        currentLang = 'en-IN'
        langSelect.value = 'en-IN'
      } else {
        desiBtn.classList.remove('active')
        if (currentLang === 'en-IN') {
          currentLang = 'en-US'
          langSelect.value = 'en-US'
        }
      }
    }

    function sendModeToMain() {
      api?.setModeFromOverlay({ isDesiMode: desiMode, language: currentLang })
    }

    // ── IPC listeners ─────────────────────────────────────────
    if (api) {
      api.onQuestion((data) => {
        questionText.textContent = data.text || ''
        questionSec.classList.remove('hidden')
        fullAnswer = ''
        answerText.textContent = ''
        answerText.classList.remove('empty')
        cursor.classList.remove('hidden')
        setStatus('thinking')
      })

      api.onAnswer((data) => {
        if (data.done) {
          cursor.classList.add('hidden')
          setStatus('ready')
          return
        }
        if (data.text) {
          if (fullAnswer === '') {
            setStatus('thinking')
            answerWrap.style.display = 'block'
            thinkingDots.className = ''
          }
          fullAnswer += data.text
          answerText.textContent = fullAnswer
          answerText.classList.remove('empty')
          answerWrap.scrollTop = answerWrap.scrollHeight
        }
      })

      api.onStatus((s) => setStatus(s))

      api.onClear(() => {
        fullAnswer = ''
        answerText.textContent = 'Waiting for a question…'
        answerText.classList.add('empty')
        questionSec.classList.add('hidden')
        cursor.classList.add('hidden')
        setStatus('idle')
      })

      api.onCopyAnswer(() => copyAnswer())

      // Mic state updates from main process
      api.onMicState((state) => applyMicState(state.active))

      // Mode confirmed back from main
      api.onModeConfirmed((data) => {
        applyDesiMode(data.isDesiMode)
        if (!data.isDesiMode && data.language) {
          currentLang = data.language
          langSelect.value = data.language
        }
      })

      // Query initial mic state
      api.getMicState().then((state) => applyMicState(state.active))
    }

    // ── Opacity slider ────────────────────────────────────────
    opacitySlider.addEventListener('input', () => {
      api?.setOpacity(parseInt(opacitySlider.value) / 100)
    })

    // ── Copy answer ───────────────────────────────────────────
    function copyAnswer() {
      if (!fullAnswer) return
      navigator.clipboard.writeText(fullAnswer).then(() => {
        copyBtn.textContent = '✓ Copied'
        copyBtn.classList.add('copied')
        setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied') }, 2000)
      })
    }
    copyBtn.addEventListener('click', copyAnswer)

    // ── Mic toggle ────────────────────────────────────────────
    micBtn.addEventListener('click', () => api?.toggleMicFromOverlay())

    // ── Desi mode toggle ──────────────────────────────────────
    desiBtn.addEventListener('click', () => {
      applyDesiMode(!desiMode)
      sendModeToMain()
    })

    // ── Language select ───────────────────────────────────────
    langSelect.addEventListener('change', () => {
      currentLang = langSelect.value
      // Desi mode follows en-IN
      if (currentLang === 'en-IN') {
        applyDesiMode(true)
      } else {
        desiBtn.classList.remove('active')
        desiMode = false
      }
      sendModeToMain()
    })

    // ── Show main app ─────────────────────────────────────────
    showAppBtn.addEventListener('click', () => api?.showMainWindow())

    // ── Clear ─────────────────────────────────────────────────
    clearBtn.addEventListener('click', () => {
      fullAnswer = ''
      answerText.textContent = 'Waiting for a question…'
      answerText.classList.add('empty')
      questionSec.classList.add('hidden')
      cursor.classList.add('hidden')
      thinkingDots.className = ''
      answerWrap.style.display = 'block'
      setStatus('idle')
    })

    // ── Minimize / Close ──────────────────────────────────────
    minimizeBtn.addEventListener('click', () => api?.hideOverlay())
    closeBtn.addEventListener('click',    () => {
      // Closing overlay → show main app so user isn't stranded
      api?.showMainWindow()
      api?.hideOverlay()
    })

    setStatus('idle')
  </script>
</body>
</html>
