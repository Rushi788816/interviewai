name: Build macOS .dmg

on:
  workflow_dispatch:          # run manually from GitHub Actions tab
    inputs:
      version:
        description: 'Release tag to upload to (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local for build
        run: |
          cat > .env.local << 'EOF'
          DATABASE_URL="${{ secrets.DATABASE_URL }}"
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}"
          NEXTAUTH_URL="http://localhost:3000"
          EOF

      - name: Build Next.js (standalone)
        run: npx cross-env ELECTRON_BUILD=1 next build

      - name: Build macOS .dmg
        run: npx electron-builder build --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # skip code signing (no Apple cert needed)

      - name: Find built .dmg
        id: find_dmg
        run: |
          DMG=$(ls dist-electron/*.dmg | head -1)
          echo "path=$DMG" >> $GITHUB_OUTPUT
          echo "name=$(basename $DMG)" >> $GITHUB_OUTPUT

      - name: Upload .dmg to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: ${{ steps.find_dmg.outputs.path }}
          name: InterviewAI ${{ github.event.inputs.version }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
